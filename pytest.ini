[pytest]
testpaths = tests
; No separate account is available to test the rate-limit scenario, so it shares
; the login quota (10 req/min) with every other test and is excluded from the
; main suite. Run it on its own with: pytest -m rate_limit
addopts = --alluredir=allure-results --clean-alluredir -m "not rate_limit and not slow"
markers =
    rate_limit: hammers POST /auth/login to verify the 10 req/min throttle
        run in isolation with `pytest -m rate_limit` since it burns the shared login quota
    slow: waits for a discovery scan to fully complete (~60s+);
        run in isolation with `pytest -m slow`